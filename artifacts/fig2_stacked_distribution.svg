  <rect x="130"  y="210" width="7.2"  height="14" fill="#E8F0F8"/>
  <rect x="137.2" y="210" width="28.8" height="14" fill="#85B7EB"/>
  <rect x="166"   y="210" width="72"   height="14" fill="#378ADD"/>
  <rect x="238"   y="210" width="50.4" height="14" fill="#185FA5"/>
  <rect x="288.4" y="210" width="21.6" height="14" fill="#042C53"/>

  <!-- 10. OSS [4,8,18,14,6] -->
  <text x="125" y="242" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">OSS ecosystem</text>
  <rect x="130"  y="232" width="14.4" height="14" fill="#E8F0F8"/>
  <rect x="144.4" y="232" width="28.8" height="14" fill="#85B7EB"/>
  <rect x="173.2" y="232" width="64.8" height="14" fill="#378ADD"/>
  <rect x="238"   y="232" width="50.4" height="14" fill="#185FA5"/>
  <rect x="288.4" y="232" width="21.6" height="14" fill="#042C53"/>

