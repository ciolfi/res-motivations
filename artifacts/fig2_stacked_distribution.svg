  <rect x="137.2" y="188" width="21.6" height="14" fill="#85B7EB"/>
  <rect x="158.8" y="188" width="64.8" height="14" fill="#378ADD"/>
  <rect x="223.6" y="188" width="57.6" height="14" fill="#185FA5"/>
  <rect x="281.2" y="188" width="28.8" height="14" fill="#042C53"/>

