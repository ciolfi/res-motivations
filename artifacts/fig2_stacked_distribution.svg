  <rect x="137.2" y="100" width="14.4" height="14" fill="#85B7EB"/>
  <rect x="151.6" y="100" width="57.6" height="14" fill="#378ADD"/>
  <rect x="209.2" y="100" width="72"   height="14" fill="#185FA5"/>
