  <text x="125" y="154" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Performance</text>
  <rect x="130"  y="144" width="7.2"  height="14" fill="#E8F0F8"/>
  <rect x="137.2" y="144" width="14.4" height="14" fill="#85B7EB"/>
  <rect x="151.6" y="144" width="50.4" height="14" fill="#378ADD"/>
  <rect x="202"   y="144" width="79.2" height="14" fill="#185FA5"/>
  <rect x="281.2" y="144" width="28.8" height="14" fill="#042C53"/>

  <!-- 7. Documentation [2,6,16,18,8] -->
  <text x="125" y="176" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Documentation</text>
  <rect x="130"  y="166" width="7.2"  height="14" fill="#E8F0F8"/>
  <rect x="137.2" y="166" width="21.6" height="14" fill="#85B7EB"/>
  <rect x="158.8" y="166" width="57.6" height="14" fill="#378ADD"/>
