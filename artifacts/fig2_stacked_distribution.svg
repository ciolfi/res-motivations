  <!-- legend -->
  <rect x="10"  y="404" width="8" height="8" fill="#E8F0F8" stroke="#aaa" stroke-width="0.5"/>
  <text x="21"  y="412" font-family="sans-serif" font-size="7" fill="#333">1 – Not important</text>
  <rect x="10"  y="416" width="8" height="8" fill="#85B7EB"/>
  <text x="21"  y="424" font-family="sans-serif" font-size="7" fill="#333">2</text>
  <rect x="100" y="404" width="8" height="8" fill="#378ADD"/>
  <text x="111" y="412" font-family="sans-serif" font-size="7" fill="#333">3 – Neutral</text>
  <rect x="100" y="416" width="8" height="8" fill="#185FA5"/>
  <text x="111" y="424" font-family="sans-serif" font-size="7" fill="#333">4</text>
  <rect x="190" y="404" width="8" height="8" fill="#042C53"/>
  <text x="201" y="412" font-family="sans-serif" font-size="7" fill="#333">5 – Very important</text>
