  <text x="125" y="286" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Free-tier access</text>
  <rect x="130"  y="276" width="21.6" height="14" fill="#E8F0F8"/>
  <rect x="151.6" y="276" width="43.2" height="14" fill="#85B7EB"/>
  <rect x="194.8" y="276" width="50.4" height="14" fill="#378ADD"/>
  <rect x="245.2" y="276" width="43.2" height="14" fill="#185FA5"/>
