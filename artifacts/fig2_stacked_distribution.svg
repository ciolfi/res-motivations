<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 430" width="340" height="430">
  <rect width="340" height="430" fill="#ffffff"/>

  <!-- title -->
  <text x="170" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#222">Response distribution across Likert scale points (%)</text>
  <text x="170" y="25" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">(N = 50)</text>

  <!-- x axis: x=130 → 0%, x=310 → 100%, scale=1.8px per % -->
  <line x1="130" y1="32" x2="130" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="175" y1="32" x2="175" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="220" y1="32" x2="220" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="265" y1="32" x2="265" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="310" y1="32" x2="310" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <text x="130" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">0%</text>
  <text x="175" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">25%</text>
  <text x="220" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">50%</text>
  <text x="265" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">75%</text>
  <text x="310" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">100%</text>
  <text x="220" y="395" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">Percentage of respondents</text>

  <!-- rows: y start=34, bar=14, gap=8, row=22 -->
  <!-- scale: 1 count = 2% = 3.6px. So count*3.6 = width in px -->
  <!-- dist [r1,r2,r3,r4,r5] counts out of 50, sorted by mean desc -->
  <!-- colors: r1=#E8F0F8 r2=#85B7EB r3=#378ADD r4=#185FA5 r5=#042C53 -->

  <!-- 1. Project fit [0,2,8,22,18] -->
  <text x="125" y="44" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Project fit</text>
  <rect x="130" y="34" width="0"    height="14" fill="#E8F0F8"/>
  <rect x="130" y="34" width="7.2"  height="14" fill="#85B7EB"/>
  <rect x="137.2" y="34" width="28.8" height="14" fill="#378ADD"/>
  <rect x="166"   y="34" width="79.2" height="14" fill="#185FA5"/>
  <rect x="245.2" y="34" width="64.8" height="14" fill="#042C53"/>

  <!-- 2. Learning [0,4,10,20,16] -->
  <text x="125" y="66" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Learning interest</text>
  <rect x="130" y="56" width="0"    height="14" fill="#E8F0F8"/>
  <rect x="130" y="56" width="14.4" height="14" fill="#85B7EB"/>
  <rect x="144.4" y="56" width="36"  height="14" fill="#378ADD"/>
  <rect x="180.4" y="56" width="72"  height="14" fill="#185FA5"/>
  <rect x="252.4" y="56" width="57.6" height="14" fill="#042C53"/>

  <!-- 3. Past experience [0,4,14,20,12] -->
  <text x="125" y="88" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Past experience</text>
  <rect x="130" y="78" width="0"    height="14" fill="#E8F0F8"/>
  <rect x="130" y="78" width="14.4" height="14" fill="#85B7EB"/>
  <rect x="144.4" y="78" width="50.4" height="14" fill="#378ADD"/>
  <rect x="194.8" y="78" width="72"   height="14" fill="#185FA5"/>
  <rect x="266.8" y="78" width="43.2" height="14" fill="#042C53"/>

