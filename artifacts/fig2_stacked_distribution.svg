  <text x="125" y="330" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Peer rec.</text>
  <rect x="130"  y="320" width="36"   height="14" fill="#E8F0F8"/>
  <rect x="166"  y="320" width="50.4" height="14" fill="#85B7EB"/>
  <rect x="216.4" y="320" width="50.4" height="14" fill="#378ADD"/>
  <rect x="266.8" y="320" width="28.8" height="14" fill="#185FA5"/>
  <rect x="295.6" y="320" width="14.4" height="14" fill="#042C53"/>

  <!-- 15. Industry [10,14,16,6,4] -->
  <text x="125" y="352" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Industry endors.</text>
  <rect x="130"  y="342" width="36"   height="14" fill="#E8F0F8"/>
  <rect x="166"  y="342" width="50.4" height="14" fill="#85B7EB"/>
  <rect x="216.4" y="342" width="57.6" height="14" fill="#378ADD"/>
  <rect x="274"  y="342" width="21.6" height="14" fill="#185FA5"/>
