  <rect x="137.2" y="122" width="21.6" height="14" fill="#85B7EB"/>
  <rect x="158.8" y="122" width="50.4" height="14" fill="#378ADD"/>
  <rect x="209.2" y="122" width="64.8" height="14" fill="#185FA5"/>
  <rect x="274"   y="122" width="36"   height="14" fill="#042C53"/>

