<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 300" width="340" height="300">
  <rect width="340" height="300" fill="#ffffff"/>

  <!-- title -->
  <text x="170" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#222">Top five vs. bottom five factors by mean rating</text>
  <text x="170" y="25" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">(N = 50)</text>

  <!-- y axis: 1–5, y=240 → 1.0, y=40 → 5.0, scale=50px per unit -->
  <!-- gridlines -->
  <line x1="30" y1="240" x2="320" y2="240" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="190" x2="320" y2="190" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="140" x2="320" y2="140" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="90"  x2="320" y2="90"  stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="40"  x2="320" y2="40"  stroke="#ddd" stroke-width="0.5"/>

  <!-- y axis labels -->
  <text x="24" y="243" text-anchor="end" font-family="sans-serif" font-size="8" fill="#555">1</text>
  <text x="24" y="193" text-anchor="end" font-family="sans-serif" font-size="8" fill="#555">2</text>
  <text x="24" y="143" text-anchor="end" font-family="sans-serif" font-size="8" fill="#555">3</text>
  <text x="24" y="93"  text-anchor="end" font-family="sans-serif" font-size="8" fill="#555">4</text>
  <text x="24" y="43"  text-anchor="end" font-family="sans-serif" font-size="8" fill="#555">5</text>
  <text x="10" y="145" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666" transform="rotate(-90,10,145)">Mean rating</text>

  <!-- bar width=22, positions for 10 bars with divider gap -->
  <!-- top 5: x = 35,62,89,116,143 -->
  <!-- bottom 5: x = 178,205,232,259,286 -->
  <!-- h = (mean-1)*50, y = 240-h -->

  <!-- Project fit 4.28: h=164, y=76 -->
  <rect x="35"  y="76"  width="22" height="164" fill="#1a4f8a" rx="1"/>
  <text x="46"  y="71"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a4f8a">4.28</text>
  <text x="46"  y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Project fit</text>

  <!-- Learning 4.12: h=156, y=84 -->
  <rect x="62"  y="84"  width="22" height="156" fill="#1a4f8a" rx="1"/>
  <text x="73"  y="79"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a4f8a">4.12</text>
  <text x="73"  y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Learning</text>

  <!-- Past exp 3.92: h=146, y=94 -->
  <rect x="89"  y="94"  width="22" height="146" fill="#185FA5" rx="1"/>
  <text x="100" y="89"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="#185FA5">3.92</text>
  <text x="100" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Past exp.</text>

  <!-- Dev speed 3.82: h=141, y=99 -->
  <rect x="116" y="99"  width="22" height="141" fill="#185FA5" rx="1"/>
  <text x="127" y="94"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="#185FA5">3.82</text>
  <text x="127" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Dev speed</text>

  <!-- Employability 3.76: h=138, y=102 -->
  <rect x="143" y="102" width="22" height="138" fill="#185FA5" rx="1"/>
  <text x="154" y="97"  text-anchor="middle" font-family="sans-serif" font-size="7" fill="#185FA5">3.76</text>
  <text x="154" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Employab.</text>

  <!-- divider -->
  <line x1="172" y1="35" x2="172" y2="245" stroke="#ddd" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="172" y="32" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#bbb">Top 5 / Bottom 5</text>

  <!-- Team familiarity 3.22: h=111, y=129 -->
  <rect x="178" y="129" width="22" height="111" fill="#85B7EB" rx="1"/>
  <text x="189" y="124" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#555">3.22</text>
  <text x="189" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Team fam.</text>

  <!-- Free-tier 3.16: h=108, y=132 -->
  <rect x="205" y="132" width="22" height="108" fill="#85B7EB" rx="1"/>
  <text x="216" y="127" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#555">3.16</text>
  <text x="216" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Free-tier</text>

  <!-- Instructor 2.90: h=95, y=145 -->
  <rect x="232" y="145" width="22" height="95"  fill="#c0d8ef" rx="1"/>
  <text x="243" y="140" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#555">2.90</text>
  <text x="243" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Instructor</text>

  <!-- Peer rec 2.84: h=92, y=148 -->
  <rect x="259" y="148" width="22" height="92"  fill="#c0d8ef" rx="1"/>
  <text x="270" y="143" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#555">2.84</text>
  <text x="270" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Peer rec.</text>

  <!-- Industry 2.78: h=89, y=151 -->
  <rect x="286" y="151" width="22" height="89"  fill="#c0d8ef" rx="1"/>
  <text x="297" y="146" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#555">2.78</text>
  <text x="297" y="256" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#333">Industry</text>

  <!-- legend -->
  <rect x="50"  y="270" width="8" height="8" fill="#1a4f8a" rx="1"/>
  <text x="62"  y="278" font-family="sans-serif" font-size="7" fill="#333">Top 5 factors</text>
  <rect x="170" y="270" width="8" height="8" fill="#85B7EB" rx="1"/>
  <text x="182" y="278" font-family="sans-serif" font-size="7" fill="#333">Bottom 5 factors</text>
</svg>
