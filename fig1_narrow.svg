<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 420" width="340" height="420">
  <rect width="340" height="420" fill="#ffffff"/>

  <!-- title -->
  <text x="170" y="14" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#222">Mean importance ratings by motivation factor</text>
  <text x="170" y="25" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">(N = 50, scale 1–5)</text>

  <!-- x axis gridlines: x=130 → 1.0, x=310 → 5.0, scale=45px per unit -->
  <line x1="130" y1="32" x2="130" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="175" y1="32" x2="175" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="220" y1="32" x2="220" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="265" y1="32" x2="265" y2="375" stroke="#ddd" stroke-width="0.5"/>
  <line x1="310" y1="32" x2="310" y2="375" stroke="#ddd" stroke-width="0.5"/>

  <!-- x axis tick labels -->
  <text x="130" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">1</text>
  <text x="175" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">2</text>
  <text x="220" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">3</text>
  <text x="265" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">4</text>
  <text x="310" y="384" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">5</text>
  <text x="220" y="395" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#666">Mean rating (1–5)</text>

  <!-- bars: y start=34, row height=22 (bar=14, gap=8) -->
  <!-- x = 130 + (mean-1)*45 -->

  <!-- 1. Project fit 4.28 → w=(3.28)*45=147.6 -->
  <rect x="130" y="34" width="148" height="14" fill="#1a4f8a" rx="1"/>
  <text x="125" y="44" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Project fit</text>
  <text x="281" y="44" font-family="sans-serif" font-size="8" fill="#1a4f8a"> 4.28</text>

  <!-- 2. Learning interest 4.12 → w=(3.12)*45=140.4 -->
  <rect x="130" y="56" width="140" height="14" fill="#1a4f8a" rx="1"/>
  <text x="125" y="66" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Learning interest</text>
  <text x="273" y="66" font-family="sans-serif" font-size="8" fill="#1a4f8a"> 4.12</text>

  <!-- 3. Past experience 3.92 → w=(2.92)*45=131.4 -->
  <rect x="130" y="78" width="131" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="88" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Past experience</text>
  <text x="264" y="88" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.92</text>

  <!-- 4. Dev speed 3.82 → w=(2.82)*45=126.9 -->
  <rect x="130" y="100" width="127" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="110" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Dev speed</text>
  <text x="260" y="110" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.82</text>

  <!-- 5. Employability 3.76 → w=(2.76)*45=124.2 -->
  <rect x="130" y="122" width="124" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="132" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Employability</text>
  <text x="257" y="132" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.76</text>

  <!-- 6. Performance 3.72 → w=(2.72)*45=122.4 -->
  <rect x="130" y="144" width="122" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="154" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Performance</text>
  <text x="255" y="154" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.72</text>

  <!-- 7. Documentation 3.68 → w=(2.68)*45=120.6 -->
  <rect x="130" y="166" width="121" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="176" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Documentation</text>
  <text x="254" y="176" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.68</text>

  <!-- 8. Tool integration 3.60 → w=(2.60)*45=117 -->
  <rect x="130" y="188" width="117" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="198" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Tool integration</text>
  <text x="250" y="198" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.60</text>

  <!-- 9. Prior familiarity 3.54 → w=(2.54)*45=114.3 -->
  <rect x="130" y="210" width="114" height="14" fill="#378ADD" rx="1"/>
  <text x="125" y="220" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Prior familiarity</text>
  <text x="247" y="220" font-family="sans-serif" font-size="8" fill="#378ADD"> 3.54</text>

  <!-- 10. OSS ecosystem 3.44 → w=(2.44)*45=109.8 -->
  <rect x="130" y="232" width="110" height="14" fill="#85B7EB" rx="1"/>
  <text x="125" y="242" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">OSS ecosystem</text>
  <text x="243" y="242" font-family="sans-serif" font-size="8" fill="#555"> 3.44</text>

  <!-- 11. Team familiarity 3.22 → w=(2.22)*45=99.9 -->
  <rect x="130" y="254" width="100" height="14" fill="#85B7EB" rx="1"/>
  <text x="125" y="264" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Team familiarity</text>
  <text x="233" y="264" font-family="sans-serif" font-size="8" fill="#555"> 3.22</text>

  <!-- 12. Free-tier 3.16 → w=(2.16)*45=97.2 -->
  <rect x="130" y="276" width="97" height="14" fill="#85B7EB" rx="1"/>
  <text x="125" y="286" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Free-tier access</text>
  <text x="230" y="286" font-family="sans-serif" font-size="8" fill="#555"> 3.16</text>

  <!-- 13. Instructor rec 2.90 → w=(1.90)*45=85.5 -->
  <rect x="130" y="298" width="86" height="14" fill="#c0d8ef" rx="1"/>
  <text x="125" y="308" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Instructor rec.</text>
  <text x="219" y="308" font-family="sans-serif" font-size="8" fill="#555"> 2.90</text>

  <!-- 14. Peer rec 2.84 → w=(1.84)*45=82.8 -->
  <rect x="130" y="320" width="83" height="14" fill="#c0d8ef" rx="1"/>
  <text x="125" y="330" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Peer rec.</text>
  <text x="216" y="330" font-family="sans-serif" font-size="8" fill="#555"> 2.84</text>

  <!-- 15. Industry endorsement 2.78 → w=(1.78)*45=80.1 -->
  <rect x="130" y="342" width="80" height="14" fill="#c0d8ef" rx="1"/>
  <text x="125" y="352" text-anchor="end" font-family="sans-serif" font-size="8" fill="#333">Industry endors.</text>
  <text x="213" y="352" font-family="sans-serif" font-size="8" fill="#555"> 2.78</text>

  <!-- legend -->
  <rect x="10"  y="368" width="8" height="8" fill="#1a4f8a" rx="1"/>
  <text x="21"  y="376" font-family="sans-serif" font-size="7" fill="#333">High (4.0+)</text>
  <rect x="80"  y="368" width="8" height="8" fill="#378ADD" rx="1"/>
  <text x="91"  y="376" font-family="sans-serif" font-size="7" fill="#333">Mod-high (3.5–3.99)</text>
  <rect x="195" y="368" width="8" height="8" fill="#85B7EB" rx="1"/>
  <text x="206" y="376" font-family="sans-serif" font-size="7" fill="#333">Moderate (3.0–3.49)</text>
  <rect x="280" y="368" width="8" height="8" fill="#c0d8ef" rx="1"/>
  <text x="291" y="376" font-family="sans-serif" font-size="7" fill="#333">Low (&lt;3.0)</text>

</svg>
